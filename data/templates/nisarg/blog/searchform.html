{{ define "nisarg/blog/searchform.html" }}
<form role="search" method="get" class="search-form" action="/article/search">

		<span class="screen-reader-text">Search for:</span>
		<input type="search" class="search-field" placeholder="Search &hellip;" value="{{.SearchQuery}}" name="wd" title="Search for:" />

</form>
