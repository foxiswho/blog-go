# 打包所有，包括项目程序，后台前端模块 sys,manage
name: Build all

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      branch:
        description: '指定要打包的分支 main'
        required: false
        default: 'main'
        type: string
      release_tag:
        description: 'Release版本Tag（如v1.0.0，为空则仅保存产物不上传Release）'
        default: 'v0.0.1'
        required: false
        type: string
      frontend_tag:
        description: '后台前端 Release版本Tag'
        default: 'v0.0.1'
        required: false
        type: string
env:
  HUSKY: '0'
  BINARY_NAME: "blogGo"
  ZIP_NAME: "blogGo-all"

jobs:
  build-go-binary:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin] # 需要打包的系统
        goarch: [amd64, arm64] # 需要打包的架构
        exclude: # 排除某些平台和架构
          - goarch: arm64
            goos: windows
    steps:
      # 拉取代码
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # 拉取手动指定的分支
          ref: ${{ github.event.inputs.branch }}

      - name: Get formatted timestamp
        id: container_shell
        run: |
          # 格式：年-月-日_时-分-秒（如 2024-05-20_14-30-25）
          FORMATTED_TS=$(date +"%Y-%m-%d_%H-%M-%S")
          # 紧凑格式：年月日时分秒（如 20240520143025）
          COMPACT_TS=$(date +"%Y%m%d%H%M%S")
          # 工作目录
          WORK_DIR=$(pwd)
          # ldflags
          ldflags='-s -w -extldflags "-static" -X "main.UserName=" '
          ldflags=${ldflags}'-X "github.com/foxiswho/blog-go/cmd.BuildVersion=${{ github.event.inputs.release_tag }}"  '
          ldflags=${ldflags}'-X "github.com/foxiswho/blog-go/cmd.BuildGitCommit=${{ github.sha }}"  '
          ldflags=${ldflags}'-X "github.com/foxiswho/blog-go/cmd.BuildTime=${{ steps.container_shell.outputs.compact }}"  '
          #
          build_flags='-a -gcflags="all=-trimpath='${WORK_DIR}'" '
          build_flags=${build_flags}' -asmflags="all=-trimpath='${WORK_DIR}'" -trimpath'
          # 输出变量
          echo "formatted=$FORMATTED_TS" >> $GITHUB_OUTPUT
          echo "compact=$COMPACT_TS" >> $GITHUB_OUTPUT
          echo "workDir=$WORK_DIR" >> $GITHUB_OUTPUT
          echo "ldflags=$ldflags" >> $GITHUB_OUTPUT
          echo "build_flags=$build_flags" >> $GITHUB_OUTPUT
          #
          echo "格式化时间戳: ${{ steps.container_shell.outputs.formatted }}"
          echo "紧凑时间戳: ${{ steps.container_shell.outputs.compact }}"
          echo "ldflags 参数: ${{ steps.container_shell.outputs.ldflags }}"
          echo "build_flags 参数: ${{ steps.container_shell.outputs.build_flags }}"
          echo "workDir 参数: ${{ steps.container_shell.outputs.workDir }}"

      # 工具默认不会自动创建 Tag/Release，只能往「已存在的 Release（绑定对应 Tag）」上传产物
      - name: build
        uses: wangyoucao577/go-release-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # 一个默认的变量，用来实现往 Release 中添加文件
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          # 可以指定编译使用的 Golang 版本
          #goversion: "https://golang.google.cn/dl/go1.26.0.linux-amd64.tar.gz"
          goversion: "1.26.0"
          binary_name: ${{ env.BINARY_NAME }} # 可以指定二进制文件的名称
          build_flags: -a -trimpath
          ldflags: "${{ steps.container_shell.outputs.ldflags }}"
          # 仅当填写了release_tag时，才上传到Release（避免Tag缺失报错）
          release_tag: ${{ github.event.inputs.release_tag }}
          release_name: ${{ github.event.inputs.release_tag }}
          # 覆盖同名 Tag 的 Release 产物
          overwrite: true
          asset_name: ${{ env.BINARY_NAME }}-all-${{ github.event.inputs.release_tag }}-${{ matrix.goos }}-${{ matrix.goarch }}
          # 项目目录
          #project_path: "./cmd/test-binary"
          # 需要包含的额外文件 或文件夹
          extra_files: ./xf ./data ./scripts/service.sh
          #是否上传产物到 Release（默认 true）；
          #设为 false 时，仅编译不上传，留给后续步骤处理（如签名）
          upload: true

      - name: List
        run: |
          ls -la ./
          echo "ok"