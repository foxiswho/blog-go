# 打包所有，包括项目程序，后台前端模块 sys,manage
name: Build all

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      branch:
        description: '指定要打包的分支 main'
        required: false
        default: 'main'
        type: string
      release_tag:
        description: 'Release版本Tag（如v1.0.0，为空则仅保存产物不上传Release）'
        default: 'v0.0.1'
        required: false
        type: string
      frontend_tag:
        description: '后台前端 Release版本Tag'
        default: 'v0.0.1'
        required: false
        type: string
env:
  HUSKY: '0'
  BINARY_NAME: "blogGo"
  ZIP_NAME: "blogGo-all"

jobs:
  build-go-binary:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin] # 需要打包的系统
        goarch: [amd64, arm64] # 需要打包的架构
        exclude: # 排除某些平台和架构
          - goarch: arm64
            goos: windows
    steps:
      # 拉取代码
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # 拉取手动指定的分支
          ref: ${{ github.event.inputs.branch }}

      - name: Get formatted timestamp
        id: get_formatted_ts
        run: |
          # 格式：年-月-日_时-分-秒（如 2024-05-20_14-30-25）
          FORMATTED_TS=$(date +"%Y-%m-%d_%H-%M-%S")
          # 紧凑格式：年月日时分秒（如 20240520143025）
          COMPACT_TS=$(date +"%Y%m%d%H%M%S")
          # 输出变量
          echo "formatted=$FORMATTED_TS" >> $GITHUB_OUTPUT
          echo "compact=$COMPACT_TS" >> $GITHUB_OUTPUT
      - name: ldflags formatted
        id: ldflags
        run: |
          ldflags=-s -w -extldflags "-static" -X "main.UserName=" -X "github.com/foxiswho/blog-go/cmd.BuildVersion=${{ github.event.inputs.release_tag }}" -X "github.com/foxiswho/blog-go/cmd.BuildGitCommit=${{ GITHUB_SHA }}" -X "github.com/foxiswho/blog-go/cmd.BuildTime=${{ steps.get_formatted_ts.outputs.compact }}"
          # 输出变量
          echo "ldflags=$ldflags" >> $GITHUB_OUTPUT
          echo $ldflags

      - name: Use formatted timestamp
        run: |
          echo "格式化时间戳: ${{ steps.get_formatted_ts.outputs.formatted }}"
          echo "紧凑时间戳: ${{ steps.get_formatted_ts.outputs.compact }}"
          echo "ldflags参数: ${{ steps.ldflags.outputs.ldflags }}"
      # 步骤2：下载远程ZIP文件（GitHub Releases的文件）
      - name: Download blog-go-frontend GitHub Releases
        run: |
          mkdir -p ./tmp
          mkdir -p ./xf
          # 定义远程ZIP URL和本地保存名称
          REMOTE_ZIP_URL="https://github.com/foxiswho/blog-go-frontend/releases/download/${{ github.event.inputs.frontend_tag }}/blogGo-manage-dist-subdirectory.zip"
          REMOTE_ZIP_NAME="manage.zip"
          
          # 用curl下载（添加重试机制，避免网络波动）
          curl -fL --retry 3 --fail -o ./tmp/$REMOTE_ZIP_NAME $REMOTE_ZIP_URL
          ls -la ./xf
          
          # 验证文件是否下载成功（可选）
          if [ ! -f "./tmp/$REMOTE_ZIP_NAME" ]; then
            echo "远程ZIP下载失败！"
            exit 1
          fi
          echo "远程ZIP下载完成：$REMOTE_ZIP_NAME"
          unzip -o ./tmp/$REMOTE_ZIP_NAME -d ./xf/manage
          
          # 定义远程ZIP URL和本地保存名称
          REMOTE_ZIP_URL="https://github.com/foxiswho/blog-go-frontend/releases/download/${{ github.event.inputs.frontend_tag }}/blogGo-sys-dist-subdirectory.zip"
          REMOTE_ZIP_NAME="sys.zip"
          
          # 用curl下载（添加重试机制，避免网络波动）
          curl -fL --retry 3 --fail -o ./tmp/$REMOTE_ZIP_NAME $REMOTE_ZIP_URL
          
          # 验证文件是否下载成功（可选）
          if [ ! -f "./tmp/$REMOTE_ZIP_NAME" ]; then
            echo "远程ZIP下载失败！"
            exit 1
          fi
          echo "远程ZIP下载完成：$REMOTE_ZIP_NAME"
          unzip -o ./tmp/$REMOTE_ZIP_NAME -d ./xf/sys
          
          ls -la ./xf
          mkdir -p ./data/nginx
          mkdir -p ./data/supervisor
          cp -rf ./scripts/nginx*  ./data/nginx/
          cp -rf ./scripts/supervisor*  ./data/supervisor/
          ls -la ./data
          ls -la ./data/nginx
          ls -la ./data/supervisor
          

      # 工具默认不会自动创建 Tag/Release，只能往「已存在的 Release（绑定对应 Tag）」上传产物
      - name: build
        uses: wangyoucao577/go-release-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # 一个默认的变量，用来实现往 Release 中添加文件
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          # 可以指定编译使用的 Golang 版本
          goversion: "https://golang.google.cn/dl/go1.26.0.linux-amd64.tar.gz"
          binary_name: ${{ env.BINARY_NAME }} # 可以指定二进制文件的名称
          build_flags: '-a -gcflags="all=-trimpath=${PWD}" -asmflags="all=-trimpath=${PWD}" -trimpath'
          ldflags: "${{ steps.ldflags.outputs.ldflags }}"
          # 仅当填写了release_tag时，才上传到Release（避免Tag缺失报错）
          release_tag: ${{ github.event.inputs.release_tag }}
          release_name: ${{ github.event.inputs.release_tag }}
          # 覆盖同名 Tag 的 Release 产物
          overwrite: true
          asset_name: ${{ env.BINARY_NAME }}-all-${{ github.event.inputs.release_tag }}-${{ matrix.goos }}-${{ matrix.goarch }}
          # 项目目录
          #project_path: "./cmd/test-binary"
          # 需要包含的额外文件 或文件夹
          extra_files: ./xf ./data ./scripts/service.sh
          #是否上传产物到 Release（默认 true）；
          #设为 false 时，仅编译不上传，留给后续步骤处理（如签名）
          upload: true

      - name: List
        run: |
          ls -la ./
          echo "ok"